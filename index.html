<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ProCam Web</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #0b0b0b;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Top Bar Controls */
        .top-bar {
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            z-index: 10;
        }

        .brand {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #d4af37; /* Subtle gold accent */
            text-transform: uppercase;
        }

        .icon-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 18px;
            padding: 8px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .icon-btn:active {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Viewfinder Wrapper */
        .viewfinder-container {
            position: relative;
            flex: 1;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            overflow: hidden;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.3s ease;
        }

        /* Rule of Thirds Grid Overlay */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            opacity: 0.3;
            transition: opacity 0.3s;
        }

        .grid-overlay.hidden {
            opacity: 0;
        }

        .grid-box {
            border: 0.5px solid rgba(255, 255, 255, 0.6);
        }

        /* Filter Presets Panel */
        .filter-carousel {
            height: 65px;
            background: rgba(11, 11, 11, 0.85);
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 0 20px;
            overflow-x: auto;
            scrollbar-width: none; /* Hide scrollbar for Firefox */
            z-index: 10;
        }

        .filter-carousel::-webkit-scrollbar {
            display: none; /* Hide scrollbar for Chrome/Safari */
        }

        .filter-opt {
            padding: 6px 14px;
            background: #222;
            border: 1px solid #333;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #aaa;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-opt.active {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        /* Bottom Control Bar */
        .control-bar {
            height: 110px;
            background: #000000;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 30px;
            z-index: 10;
        }

        .gallery-preview {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            border: 2px solid #333;
            background-size: cover;
            background-position: center;
            background-color: #111;
            cursor: pointer;
        }

        .shutter-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #ffffff;
            border: 5px solid #000000;
            outline: 2px solid #ffffff;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .shutter-btn:active {
            transform: scale(0.92);
            background: #dddddd;
        }

        /* Filter CSS Recipes */
        .filter-none { filter: none; }
        .filter-fuji-chroma { filter: contrast(1.15) saturate(1.1) sepia(0.05); }
        .filter-leica-mono { filter: grayscale(1) contrast(1.4) brightness(0.95); }
        .filter-hasse-vivid { filter: saturate(1.3) contrast(1.05) brightness(1.02); }
        .filter-vintage-cine { filter: sepia(0.2) contrast(0.9) brightness(1.05) saturate(0.95); }

    </style>
</head>
<body>

    <!-- Top Bar Navigation -->
    <div class="top-bar">
        <div class="brand">PRO || FX</div>
        <button class="icon-btn" id="grid-toggle" title="Toggle Grid">田</button>
        <button class="icon-btn" id="switch-camera" title="Switch Camera">⇄</button>
    </div>

    <!-- Viewfinder Area -->
    <div class="viewfinder-container">
        <video id="viewfinder" autoplay playsinline muted class="filter-none"></video>
        
        <!-- Rule of Thirds Grid -->
        <div class="grid-overlay" id="grid">
            <div class="grid-box"></div><div class="grid-box"></div><div class="grid-box"></div>
            <div class="grid-box"></div><div class="grid-box"></div><div class="grid-box"></div>
            <div class="grid-box"></div><div class="grid-box"></div><div class="grid-box"></div>
        </div>
    </div>

    <!-- Color Profiles (Inspired by High-End Brands) -->
    <div class="filter-carousel">
        <div class="filter-opt active" data-filter="none">STANDARD</div>
        <div class="filter-opt" data-filter="fuji-chroma">F-CHROME (FUJI)</div>
        <div class="filter-opt" data-filter="leica-mono">L-MONO (LEICA)</div>
        <div class="filter-opt" data-filter="hasse-vivid">H-VIVID (HASSELBLAD)</div>
        <div class="filter-opt" data-filter="vintage-cine">CINE-LOOK</div>
    </div>

    <!-- Main Capture Controls -->
    <div class="control-bar">
        <div class="gallery-preview" id="preview-thumbnail"></div>
        <button class="shutter-btn" id="shutter"></button>
        <div style="width: 45px;"></div> <!-- Spacer mimicking balanced composition -->
    </div>

    <script>
        const video = document.getElementById('viewfinder');
        const shutterBtn = document.getElementById('shutter');
        const switchCamBtn = document.getElementById('switch-camera');
        const gridToggle = document.getElementById('grid-toggle');
        const grid = document.getElementById('grid');
        const previewThumbnail = document.getElementById('preview-thumbnail');
        const filterButtons = document.querySelectorAll('.filter-opt');

        let currentStream = null;
        let useFacingMode = "environment"; // Defaulting to rear camera
        let activeFilterClass = "filter-none";

        // Initialize and stream camera feed
        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            // Ideal parameters to maximize hardware limits securely across mobile devices
            const constraints = {
                video: {
                    facingMode: useFacingMode,
                    width: { ideal: 4096 }, 
                    height: { ideal: 3072 },
                    frameRate: { ideal: 30 }
                },
                audio: false
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
            } catch (error) {
                console.error("Camera Access Refused or Unsupported Constraints:", error);
                alert("Please enable camera access permissions and use a secure connection (HTTPS).");
            }
        }

        // Cycle through front/back cameras
        switchCamBtn.addEventListener('click', () => {
            useFacingMode = (useFacingMode === "environment") ? "user" : "environment";
            startCamera();
        });

        // Toggle rule of thirds lines
        gridToggle.addEventListener('click', () => {
            grid.classList.toggle('hidden');
        });

        // Filter Selection handling
        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // Remove previous filter class and apply the new profile
                video.classList.remove(activeFilterClass);
                activeFilterClass = `filter-${btn.dataset.filter}`;
                video.classList.add(activeFilterClass);
            });
        });

        // Capture logic utilizing a canvas element
        shutterBtn.addEventListener('click', () => {
            if (!video.videoWidth) return;

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');

            // Apply the chosen brand filter profile directly onto the canvas image data context
            ctx.filter = getComputedStyle(video).filter;
            
            // Draw frame to canvas
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Export as data URL string to feed the gallery preview thumbnail frame
            const imageDataUrl = canvas.toDataURL('image/jpeg', 0.95);
            previewThumbnail.style.backgroundImage = `url(${imageDataUrl})`;

            // Trigger immediate local image download sequence
            const downloadLink = document.createElement('a');
            downloadLink.download = `PROCAM_${Date.now()}.jpg`;
            downloadLink.href = imageDataUrl;
            downloadLink.click();
        });

        // Execute on launch
        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
