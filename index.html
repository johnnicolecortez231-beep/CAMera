<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VHS HorrorCam</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: #050505;
            font-family: 'Courier New', Courier, monospace;
            color: #00ff00; /* Retro terminal green */
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Top Bar Info Overlay */
        .top-bar {
            height: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid #222;
            z-index: 10;
        }

        .status-rec {
            color: #ff0000;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: blink 1s steps(2, start) infinite;
        }

        @keyframes blink { to { visibility: hidden; } }

        .icon-btn {
            background: none;
            border: 1px solid #333;
            color: #aaa;
            cursor: pointer;
            font-size: 14px;
            padding: 5px 10px;
            border-radius: 4px;
            font-family: inherit;
        }

        .icon-btn:active {
            background: #222;
            color: #fff;
        }

        /* Viewfinder Window */
        .viewfinder-container {
            position: relative;
            flex: 1;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            overflow: hidden;
            background-color: #020202;
            display: flex;
            align-items: center;
            justify-content: center;
            border-left: 1px solid #111;
            border-right: 1px solid #111;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: filter 0.2s ease;
        }

        /* VHS / CRT HUD Artifacts Overlay */
        .vhs-hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.8);
        }

        .hud-text {
            color: #ebebeb;
            font-size: 14px;
            text-shadow: 1px 1px 2px #000;
            letter-spacing: 1px;
        }

        /* Glitch scanline bar simulation */
        .vhs-hud::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 6px 100%;
        }

        /* Horror Filter Presets */
        .filter-none { filter: contrast(1.1) brightness(0.95); }
        /* Sickly fluorescent workspace yellow/green vibe */
        .filter-backrooms { filter: sepia(0.5) hue-rotate(15deg) saturate(1.4) contrast(1.3) brightness(1.05); }
        /* Low grade degraded surveillance tape */
        .filter-foundfootage { filter: grayscale(0.2) contrast(1.5) brightness(0.8) blur(0.3px) saturate(0.7); }
        /* Classic monochrome static */
        .filter-analog-bw { filter: grayscale(1) contrast(1.8) brightness(0.9); }
        /* Nightvision security feed */
        .filter-nightvision { filter: hue-rotate(90deg) saturate(2) contrast(1.6) brightness(1.1); }

        /* Bottom Controls Menu */
        .filter-carousel {
            height: 60px;
            background: #000;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 15px;
            overflow-x: auto;
            border-top: 1px solid #111;
        }

        .filter-carousel::-webkit-scrollbar { display: none; }

        .filter-opt {
            padding: 6px 12px;
            background: #111;
            border: 1px solid #222;
            color: #888;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
            cursor: pointer;
            font-family: inherit;
        }

        .filter-opt.active {
            background: #00ff00;
            color: #000;
            border-color: #00ff00;
            box-shadow: 0 0 8px rgba(0,255,0,0.4);
        }

        .control-bar {
            height: 100px;
            background: #050505;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #222;
            padding: 0 40px;
        }

        .gallery-preview {
            width: 45px;
            height: 45px;
            border: 1px dashed #555;
            background-size: cover;
            background-position: center;
            background-color: #000;
        }

        .shutter-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: #ff0000;
            border: 4px solid #000;
            outline: 2px solid #ff0000;
            cursor: pointer;
        }

        .shutter-btn:active {
            transform: scale(0.95);
            background: #b30000;
        }
    </style>
</head>
<body>

    <!-- Upper Deck Menu Data Elements -->
    <div class="top-bar">
        <div class="status-rec">● REC</div>
        <button class="icon-btn" id="switch-camera">CAM ⇄</button>
    </div>

    <!-- Active Viewfinder Module Matrix -->
    <div class="viewfinder-container">
        <video id="viewfinder" autoplay playsinline muted class="filter-none"></video>
        
        <!-- CRT Screen Elements Cover Layer -->
        <div class="vhs-hud">
            <div style="display: flex; justify-content: space-between;">
                <div class="hud-text">PLAY  ▶</div>
                <div class="hud-text" id="hud-vhs-speed">SP</div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                <div class="hud-text" id="hud-date">OCT.15 1997</div>
                <div class="hud-text" id="hud-time">03:24:11</div>
            </div>
        </div>
    </div>

    <!-- Retro Decay Filters Carousel Strip -->
    <div class="filter-carousel">
        <div class="filter-opt active" data-filter="none">RAW FEED</div>
        <div class="filter-opt" data-filter="backrooms">BACKROOMS</div>
        <div class="filter-opt" data-filter="foundfootage">FOUND FOOTAGE</div>
        <div class="filter-opt" data-filter="analog-bw">ANALOG B&W</div>
        <div class="filter-opt" data-filter="nightvision">NIGHT VISION</div>
    </div>

    <!-- Capture Trigger Platform Layout -->
    <div class="control-bar">
        <div class="gallery-preview" id="preview-thumbnail"></div>
        <button class="shutter-btn" id="shutter"></button>
        <div style="width: 45px;"></div>
    </div>

    <script>
        const video = document.getElementById('viewfinder');
        const shutterBtn = document.getElementById('shutter');
        const switchCamBtn = document.getElementById('switch-camera');
        const previewThumbnail = document.getElementById('preview-thumbnail');
        const filterButtons = document.querySelectorAll('.filter-opt');
        const hudTime = document.getElementById('hud-time');
        const hudDate = document.getElementById('hud-date');

        let currentStream = null;
        let useFacingMode = "environment";
        let activeFilterClass = "filter-none";

        // Setup real-time system clock on HUD layout mimicking vintage digital cameras
        function updateHUDClock() {
            const now = new Date();
            hudTime.innerText = now.toTimeString().split(' ')[0];
            
            const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
            hudDate.innerText = `${months[now.getMonth()]} ${String(now.getDate()).padStart(2, '0')} ${now.getFullYear() - 30}`; // Pushes year back to the 90s aesthetic
        }
        setInterval(updateHUDClock, 1000);
        updateHUDClock();

        async function startCamera() {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: {
                    facingMode: useFacingMode,
                    width: { ideal: 1280 }, // Intentionally standard/lower definition to maintain authentic retro feel
                    height: { ideal: 960 }
                },
                audio: false
            };

            try {
                currentStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = currentStream;
            } catch (error) {
                console.error("Camera connection failed:", error);
            }
        }

        switchCamBtn.addEventListener('click', () => {
            useFacingMode = (useFacingMode === "environment") ? "user" : "environment";
            startCamera();
        });

        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                video.classList.remove(activeFilterClass);
                activeFilterClass = `filter-${btn.dataset.filter}`;
                video.classList.add(activeFilterClass);
            });
        });

        shutterBtn.addEventListener('click', () => {
            if (!video.videoWidth) return;

            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');

            ctx.filter = getComputedStyle(video).filter;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // Burn HUD timestamps onto the final photograph for found footage realism
            ctx.font = "24px 'Courier New', Courier, monospace";
            ctx.fillStyle = "#ebebeb";
            ctx.shadowColor = "black";
            ctx.shadowBlur = 4;
            ctx.fillText("PLAY  ▶", 30, 50);
            ctx.fillText(hudDate.innerText, 30, canvas.height - 40);
            ctx.fillText(hudTime.innerText, canvas.width - 160, canvas.height - 40);

            const imageDataUrl = canvas.toDataURL('image/jpeg', 0.85); // Slightly compressed quality
            previewThumbnail.style.backgroundImage = `url(${imageDataUrl})`;

            const downloadLink = document.createElement('a');
            downloadLink.download = `ERROR_LOG_${Date.now()}.jpg`;
            downloadLink.href = imageDataUrl;
            downloadLink.click();
        });

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
